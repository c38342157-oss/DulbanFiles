<svg xmlns="http://www.w3.org/2000/svg" data-sprite-id="db-sprite-shapes">
  <!-- DULBAN LIB · спрайт фигур. viewBox 0 0 100 100.
       Контур берёт цвет из currentColor: <svg><use href="#db-shape-hex"/></svg> -->
  <defs>
    <symbol id="db-shape-circle" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="44" fill="none" stroke="currentColor" stroke-width="6"/>
    </symbol>
    <symbol id="db-shape-dot" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="44" fill="currentColor"/>
    </symbol>
    <symbol id="db-shape-square" viewBox="0 0 100 100">
      <rect x="8" y="8" width="84" height="84" fill="none" stroke="currentColor" stroke-width="6"/>
    </symbol>
    <symbol id="db-shape-rounded" viewBox="0 0 100 100">
      <rect x="8" y="8" width="84" height="84" rx="20" fill="none" stroke="currentColor" stroke-width="6"/>
    </symbol>
    <symbol id="db-shape-diamond" viewBox="0 0 100 100">
      <rect x="20" y="20" width="60" height="60" rx="8" transform="rotate(45 50 50)" fill="none" stroke="currentColor" stroke-width="6"/>
    </symbol>
    <symbol id="db-shape-triangle" viewBox="0 0 100 100">
      <path d="M50 10 L92 88 L8 88 Z" fill="none" stroke="currentColor" stroke-width="6" stroke-linejoin="round"/>
    </symbol>
    <symbol id="db-shape-hex" viewBox="0 0 100 100">
      <path d="M28 10 L72 10 L94 50 L72 90 L28 90 L6 50 Z" fill="none" stroke="currentColor" stroke-width="6" stroke-linejoin="round"/>
    </symbol>
    <symbol id="db-shape-star" viewBox="0 0 100 100">
      <path d="M50 6 L61 38 L95 38 L67 58 L77 92 L50 71 L23 92 L33 58 L5 38 L39 38 Z" fill="none" stroke="currentColor" stroke-width="5" stroke-linejoin="round"/>
    </symbol>
    <symbol id="db-shape-ring" viewBox="0 0 100 100">
      <circle cx="50" cy="50" r="38" fill="none" stroke="currentColor" stroke-width="16"/>
    </symbol>
    <symbol id="db-shape-cross" viewBox="0 0 100 100">
      <path d="M38 8 H62 V38 H92 V62 H62 V92 H38 V62 H8 V38 H38 Z" fill="none" stroke="currentColor" stroke-width="6" stroke-linejoin="round"/>
    </symbol>
    <symbol id="db-shape-blob" viewBox="0 0 100 100">
      <path d="M50 8 C72 8 92 24 92 48 C92 74 74 92 48 92 C26 92 8 76 8 52 C8 28 28 8 50 8 Z" fill="none" stroke="currentColor" stroke-width="6" transform="rotate(12 50 50) scale(1 .92)"/>
    </symbol>
    <symbol id="db-shape-burst" viewBox="0 0 100 100">
      <path d="M50 4 L57 32 L82 18 L68 43 L96 50 L68 57 L82 82 L57 68 L50 96 L43 68 L18 82 L32 57 L4 50 L32 43 L18 18 L43 32 Z" fill="currentColor"/>
    </symbol>
    <symbol id="db-shape-squircle" viewBox="0 0 100 100">
      <path d="M50 8 C82 8 92 18 92 50 C92 82 82 92 50 92 C18 92 8 82 8 50 C8 18 18 8 50 8 Z" fill="none" stroke="currentColor" stroke-width="6"/>
    </symbol>
  </defs>
</svg>
